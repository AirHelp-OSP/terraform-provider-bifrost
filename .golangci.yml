version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam

  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    revive:
      rules:
        - name: exported
          disabled: true
    gosec:
      excludes:
        - G115 # int conversions are validated at the Terraform schema level

  exclusions:
    generated: lax
    presets:
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
          - noctx

formatters:
  enable:
    - gofmt
    - goimports
